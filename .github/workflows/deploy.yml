name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jamcraft-app/package-lock.json

      - name: Install dependencies
        working-directory: jamcraft-app
        run: npm ci

      - name: Run tests
        working-directory: jamcraft-app
        run: npm test -- --run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: jamcraft-app

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: jamcraft-app

      - name: Build application
        working-directory: jamcraft-app
        run: npm run build

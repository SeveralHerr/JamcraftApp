name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jamcraft-app/package-lock.json

      - name: Install dependencies
        working-directory: jamcraft-app
        run: npm ci

      - name: Run tests
        working-directory: jamcraft-app
        run: npm test -- --run

      - name: Build application
        working-directory: jamcraft-app
        run: npm run build

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jamcraft-app/package-lock.json

      - name: Install dependencies
        working-directory: jamcraft-app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: jamcraft-app
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: jamcraft-app
        run: npm run build

      - name: Run E2E tests
        working-directory: jamcraft-app
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: jamcraft-app/playwright-report/
          retention-days: 7
